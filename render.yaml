databases:
  - name: trip-planner-db
    plan: free
    databaseName: trip_planner
    ipAllowList: []

services:
  - type: web
    plan: free
    name: trip-planner
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trip-planner-db
          property: connectionString
